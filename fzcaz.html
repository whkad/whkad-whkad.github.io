<!DOCTYPE html>
<html>
    <head>
        <title>安装教程</title>
	<link rel="stylesheet" type="text/css" href="./css/1.css">
	<link rel="stylesheet" type="text/css" href="./css/2.css">
	<link rel="shortcut icon" href="./favicon.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, minimal-ui, viewport-fit=cover">
        <style>
            body,html{
                font-family:helvetica;
                color:#fff;
                margin:0;
            }

            img{
                width:100px;
                border-radius:23.3%;
                margin-top:40px;
            }

            a{
                text-decoration:none;
                display:inline-block;
                margin:10px;
                background-color:#222;
                padding:20px;
                color:#fff;
                width:200px;
                border-radius:30px;
            }


            h1{
                margin:10px;
                font-size:25px;
            }

            p{
                background-color:#222;
                padding:20px;
                font-size:15px;
            }

        </style>
    </head>
    <body>

        <center>
            <img src="./icon.png">
            <h1>情况1：安装了『魔改乐网插件』</h1>
            <p>1.回到手机桌面，打开并启动乐网</p>
            <p>2.浏览器访问untd.top，点『越狱工具安装』，找到需要的越狱工具安装即可</p>
            <p>PS：想安装魔改乐网插件，请在越狱状态使用浏览器访问：https://untd.top/lw/</p>
            <br>
            <br>
            <h1>情况2：未安装『魔改乐网插件』或不知道魔改乐网插件是什么</h1>
            <p>1.打开『设置』中的『无线局域网』，点击已连接WiFi右侧的（i）</p>
            <p>2.点击最底部的『配置代理』，进入勾选『自动』，然后输入地址：https://untd.top/sh</p>
            <p>3.点击存储</p>
            <p>4.浏览器访问untd.top，点『越狱工具安装』，找到需要的越狱工具安装即可</p>
            <br>
        </center>
 
    </body>
</html>
